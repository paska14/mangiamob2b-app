<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangiamo Italiano — App</title>
    <script src="https://open2b.dev/admin-sdk/open2b-admin-sdk-v7.8.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Mangiamo Italiano — App</h1>

    <div class="card">
        <h2>Stato connessione</h2>
        <div class="info-row">
            <span class="info-label">Admin SDK</span>
            <span id="sdk-status" class="loading">caricamento...</span>
        </div>
        <div class="info-row">
            <span class="info-label">Versione API</span>
            <span id="api-version" class="loading">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">Lingua gestionale</span>
            <span id="locale" class="loading">—</span>
        </div>
    </div>

    <div class="card">
        <h2>Negozio</h2>
        <div class="info-row">
            <span class="info-label">Prodotti totali</span>
            <span id="products-count" class="loading">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">Reparti</span>
            <span id="departments-count" class="loading">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">Produttori</span>
            <span id="producers-count" class="loading">—</span>
        </div>
    </div>

    <div class="card">
        <h2>Vista produttore</h2>
        <div class="producer-toolbar">
            <select id="producer-select" disabled>
                <option value="">— caricamento produttori... —</option>
            </select>
            <span id="producer-count-badge" class="badge" hidden></span>
            <button id="export-csv-btn" class="btn-export" hidden>Esporta CSV</button>
            <button id="export-all-btn" class="btn-export" disabled>Esporta tutto</button>
        </div>
        <div id="producer-table-container"></div>
    </div>

    <div class="card">
        <h2>Genera Catalogo</h2>
        <div class="producer-toolbar">
            <select id="catalog-list-select" disabled>
                <option value="">— caricamento... —</option>
            </select>
            <select id="catalog-producer-select" disabled>
                <option value="">— tutti i produttori —</option>
            </select>
            <button id="catalog-generate-btn" class="btn-export" disabled>Genera PDF</button>
            <button id="catalog-noprice-btn" class="btn-export" disabled>Genera PDF senza prezzi</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>

</body>
</html>
